<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#04030A" stroke="url(#logo-gradient)" stroke-width="3"/>

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#logo-gradient)" stroke-width="2" opacity="0.5"/>

  <!-- 3300 text -->
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#logo-gradient)" text-anchor="middle">3300</text>

  <!-- CYPHER text -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="16" fill="#FFB800" text-anchor="middle">CYPHER</text>

  <!-- Crown icon -->
  <text x="100" y="145" font-size="20" text-anchor="middle">👑</text>
</svg>
