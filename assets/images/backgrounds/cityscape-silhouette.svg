<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyline-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark sky -->
  <rect width="1920" height="1080" fill="#0a0a15"/>

  <!-- City skyline silhouette -->
  <g fill="url(#skyline-gradient)">
    <!-- Buildings from left to right -->
    <rect x="0" y="700" width="150" height="380"/>
    <rect x="50" y="600" width="80" height="100"/>

    <rect x="180" y="550" width="200" height="530"/>
    <rect x="220" y="450" width="40" height="120"/>

    <rect x="400" y="750" width="120" height="330"/>

    <rect x="550" y="650" width="180" height="430"/>
    <rect x="600" y="550" width="40" height="120"/>

    <!-- Tall central building -->
    <rect x="750" y="200" width="100" height="880"/>
    <rect x="740" y="150" width="120" height="80"/>
    <rect x="785" y="100" width="30" height="60"/>

    <rect x="900" y="600" width="150" height="480"/>

    <rect x="1080" y="700" width="140" height="380"/>

    <rect x="1250" y="620" width="200" height="460"/>
    <rect x="1290" y="520" width="40" height="120"/>

    <rect x="1480" y="740" width="120" height="340"/>

    <rect x="1630" y="680" width="180" height="400"/>
    <rect x="1670" y="580" width="40" height="120"/>

    <rect x="1840" y="760" width="80" height="320"/>
  </g>

  <!-- Add some window lights -->
  <g fill="#FFB800" opacity="0.3">
    <rect x="60" y="650" width="10" height="15"/>
    <rect x="80" y="650" width="10" height="15"/>
    <rect x="60" y="680" width="10" height="15"/>

    <rect x="220" y="600" width="15" height="20"/>
    <rect x="250" y="600" width="15" height="20"/>
    <rect x="280" y="600" width="15" height="20"/>

    <rect x="780" y="300" width="12" height="18"/>
    <rect x="800" y="300" width="12" height="18"/>
    <rect x="780" y="340" width="12" height="18"/>
    <rect x="800" y="340" width="12" height="18"/>
  </g>
</svg>
