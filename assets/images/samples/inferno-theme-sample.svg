      <stop offset="0%" style="stop-color:#2A1800;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#120D00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04030A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="853" fill="url(#bg-gradient)"/>

